name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint==3.0.0 mypy==1.7.0
      
      - name: Run mypy
        run: |
          mypy good_code.py broken_code.py
      
      - name: Run pylint
        run: |
          pylint good_code.py broken_code.py